apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: attendance-checker-be-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-clusterissuer"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://attendance.scg.skku.ac.kr"
spec:
  tls:
    - hosts:
        - api.attendance.scg.skku.ac.kr
      secretName: gitops-tls
  rules:
    - host: api.attendance.scg.skku.ac.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: attendance-checker-be-service
                port:
                  number: 80