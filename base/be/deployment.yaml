apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendance-checker-be-deployment
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: attendance-checker-be
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: attendance-checker-be
    spec:
      containers:
      - image: scgskku/attendance-checker-be-dev
        imagePullPolicy: Always
        name: attendance-checker-be
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: attendance-checker-be-secret