apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: attendance-checker-be-ingress
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-origin: # 추후 도메인 추가
spec:
  $patch: replace
  tls:
    - hosts:
        - #api 도메인 추가 필
      secretName: gitops-tls
  rules:
    - host: #api 도메인 추가 필
      http:
        paths:
          - path: /v1/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: attendance-checker-be-service
                port:
                  number: 80