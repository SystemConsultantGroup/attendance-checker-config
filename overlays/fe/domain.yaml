apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: attendance-checker-fe-ingress
spec:
  $patch: replace
  tls:
    - hosts:
        - attendance.scg.skku.ac.kr
      secretName: gitops-tls
  rules:
    - host: attendance.scg.skku.ac.kr
      http:
        paths: 
          - path: /
            pathType: Prefix
            backend:
              service:
                name: attendance-checker-fe-service
                port:
                  number: 80